# yt-clips Configuration
# Adjust these values to match your stream layout and hardware

# ─── Paths ────────────────────────────────────────────────────────────────────
paths:
  input:       input/
  temp:        temp/
  transcripts: transcripts/
  highlights:  highlights/
  shorts:      shorts/            # Final output — date-stamped subfolders
  logs:        logs/
channel:
  id: "UCQtCMKPc41MHd7hujVuGm5g"        # your YouTube channel ID
  live_stream_url: "https://www.youtube.com/watch?v=qAA6KKwHLU8"              # static fallback (optional)
# ─── Download ─────────────────────────────────────────────────────────────────
download:
  # Best available quality (no cap — downloads highest resolution available)
  format: "bv*+ba/b"
  concurrent_fragments: 16
  sleep_requests: 0
  progress_interval_seconds: 10
  progress_percent_step: 5
  output_filename: "video.mp4"
  # aria2c: 2-3x faster downloads on Colab (install: apt-get install -y aria2)
  use_aria2c: true
  # Proof of Origin (PO) Token — for bypassing bot detection
  po_token: "" 
  # Optional: Proxy for bypassing Colab IP blocks (e.g. http://user:pass@host:port)
  proxy: ""
# ─── Transcription ────────────────────────────────────────────────────────────
transcription:
  model: "small"                        # tiny | base | small | medium | large-v3
  language: "hi"                        # Hindi commentary — use hi for better accuracy
  device: "cuda"            # Prioritizes GPU, auto-falls back to CPU if missing
  compute_type: "float16"    # Optimized for GPU; auto-switches to int8 on CPU fallback
  batch_size: 24                        # Parallel segments; T4 handles 24 fine with small model
  beam_size: 3                          # ↓ from 5 — 40% faster, negligible quality loss for clips
  vad_filter: true                      # Filter out non-speech for 2-3x speedup
# ─── Highlight Detection ──────────────────────────────────────────────────────
highlight:
  # AI-powered highlight refinement
  use_ai_refinement: true              # Use LLM to select viral-worthy clips
  # Audio energy spike detection
  audio_energy_threshold: 0.25         # ↓ from 0.3 — catch more excitement moments
  # Minimum/maximum clip duration (seconds)
  min_duration: 8                       # ↓ from 10 — short punchy clips do better
  max_duration: 45                      # ↓ from 58 — data shows 35-44s is sweet spot (63.7% completion)
  # Preferred duration range (scorer boosts clips in this range)
  preferred_duration_min: 30            # Data: 35-44s = 0.342 score, 25-34s = 0.301
  preferred_duration_max: 45
  # Merge nearby highlights that are closer than this (seconds)
  merge_gap: 8
  # How many highlights to extract at most
  max_clips: 15                         # ↑ from 10 — more candidates = more content
  # Words-per-minute threshold for "fast speech" detection
  fast_speech_wpm: 140
  # Silence threshold (seconds of silence to penalise a segment)
  silence_penalty_seconds: 1.5

# ─── Premium Mode ──────────────────────────────────────────────────────────────
# Cheap path = MediaPipe BlazeFace (utils/face_detect.py, CPU) + EMA crop.
# Premium path = YOLOv8-face (GPU) + ByteTrack + Kalman + bezier crop.
premium:
  enabled: false                     # Set true on Colab T4 for studio-grade quality
  face_enhancement: true             # GFPGAN face restoration (GPU only)
  frame_interpolation: true          # FILM 30→60fps (GPU only)
  host_ref_photos: ""                # Path to reference photos for host ID (optional)
  # ── Face detection (feat/face-detection-gpu) ───────────────────────────────
  yolo_weights: "yolov8n-face.pt"    # YOLOv8-face weights (resolved against repo root)
  yolo_device: "auto"                # auto | cuda | cuda:0 | cpu  (auto => cuda if torch.cuda available)
  yolo_conf: 0.3                     # Detection confidence threshold
  yolo_iou: 0.5                      # NMS IoU threshold
  yolo_batch_size: 8                 # Batched inference over sampled frames (T4-friendly)
  yolo_require: false                # If true, fail loudly when weights/GPU unavailable (no silent CPU fallback)
  # Identity references for host face-locking (photos/ + expectation.png).
  identity_refs: ["photos", "expectation.png"]

# ─── Reference-Derived Color Grade (Phase 4.25) ───────────────────────────────
# Enrollment-once, apply-always paradigm (Apple Face ID style).
# Extracts ALL color params from reference, applies same fixed grade to every
# frame with zero face detection at inference time = zero flicker by construction.
# Optimized for T4 GPU on Colab (ffmpeg pipe, no intermediate JPEG writes).
enhancement:
  ref_grade: false                   # Enable reference-derived color grading
  reference: "expectation.png"       # Reference photo for color model enrollment

# ─── Layout ──────────────────────────────────────────────────────────────────
# Describes where the facecam lives in the SOURCE 16:9 frame (pixels).
# Set has_facecam: false if the stream has no facecam overlay.
# NOTE: Facecam coords are VALIDATED at runtime against actual source dimensions.
#       If coords exceed the source frame, facecam mode is auto-disabled.
layout:
  has_facecam: true
  # Facecam region in source video (x, y, width, height) — update per stream
  facecam:
    x: 0
    y: 540
    width: 320
    height: 180
  # How tall the facecam strip is in the 9:16 output (pixels, out of 1920)
  facecam_output_height: 400
  # Gameplay strip height = 1920 - facecam_output_height
  gameplay_output_height: 1520
  # Chat overlay detection (common in gaming/streams)
  # Chat typically appears on the RIGHT side of 16:9 streams
  has_chat_overlay: true
  chat:
    side: "right"            # right | left
    # Estimated chat width in source video (will be auto-detected if possible)
    estimated_width: 350
    # Minimum brightness threshold to detect chat area (chat is usually brighter/darker than gameplay)
    brightness_threshold: 30

# ─── Export ───────────────────────────────────────────────────────────────────
export:
  width: 1080
  height: 1920
  global_speed_factor: 1.0              # Set to 1.0 to use variable speed only (frame_analyzer.py calculates dynamic speed)
  enable_variable_speed: true            # Enable smart speed adjustment based on silence/tempo
  variable_speed_aggressive: true       # Apply more aggressive speed up on dead air
  fps: 30                               # Target FPS (motion interpolation fills gaps)
  video_bitrate: "15M"                  # ↓ from 25M — Shorts on phones, 15M is plenty
  audio_bitrate: "192k"                 # ↓ from 320k — mobile speakers, 192k indistinguishable
  crf: 22                               # ↑ from 18 — saves 30-40% encode time, invisible on mobile
  super_resolution: false                 # AI 4x upscale via Real-ESRGAN (GPU only; auto-skips on CPU)
  super_res_device: "auto"               # "auto" | "cuda:0" | "cuda:1" ... (ignored on CPU)
  max_workers: 0                         # 0 = auto (1 per GPU for super-res, else 2-4 CPU); cap parallelism
  ffmpeg_timeout_seconds: 900           # Prevent hung FFmpeg exports
  min_output_bytes: 100000              # Reject tiny/corrupt exports
  # Hardware encoder — auto-detected in export.py; config is fallback
  encoder: "libx264"                      # h264_videotoolbox (Mac) | h264_nvenc (NVIDIA) | libx264 (CPU)
  encoder_preset: "medium"              # Only used by libx264; videotoolbox ignores this
  # Crop smoothing factor (0–1); lower = smoother but more lag
  crop_smooth_factor: 0.2
  # ─── Cinematic Transitions ─────────────────────────────────────────────────
  transitions:
    fade_in_duration: 0.5               # seconds — smooth fade from black on open
    fade_out_duration: 0.5              # seconds — smooth fade to black on close
    audio_fade_in: 0.3                  # seconds — audio crossfade in
    audio_fade_out: 0.4                 # seconds — audio crossfade out

# ─── YouTube Upload ──────────────────────────────────────────────────────────
youtube:
  token_path: "yt_analytics_token.json"
  channel_id: "UCQtCMKPc41MHd7hujVuGm5g"
  privacy_status: "scheduled"            # private | unlisted | public | scheduled
  category_id: "17"                     # 17 = Sports
  self_declared_made_for_kids: false
  enforce_shorts_eligibility: true      # Refuse landscape/too-long files before upload
  shorts_max_seconds: 180               # Current YouTube Shorts maximum duration
  upload_enabled: true                  # 🚀 GO LIVE!
  schedule_interval_hours: 1            # Upload every hour (jittered, not fixed :00)
  niche: "Cricket"                      # Used for SEO trend analysis
  # ── Upload reliability (feat/youtube-upload) ──────────────────────────────
  region_code: "IN"                     # Region for categoryId validation
  contains_synthetic_media: false       # Default; per-clip metadata may override
  notify_subscribers: true              # Notify subs on publish
  upload_chunk_size_mb: 8               # Resumable chunk size (finite => real progress + resume)
  upload_max_retries: 6                 # Max transient-error retries per upload
  upload_deadline_seconds: 1800         # Hard wall-clock cap per upload (prevents hangs)

# ─── Upload Schedule ─────────────────────────────────────────────────────────
# Controls the jittered hourly scheduling strategy.
# Jitter ensures every upload hour has a different minute offset (e.g. 8:05, 9:12).
upload_schedule:
  interval_hours: 2                     # ↑ from 1 — spread clips across the day for algorithm love
  jitter_max_minutes: 55                # Max jitter offset (0-59). 55 ensures no hour spill.
  prime_time:
    enabled: true                       # Assign best clips to prime time
    evening: [19, 22]                   # Evening prime window (IST)
    lunch: [12, 14]                     # Lunch prime window (IST)
  # Dead day avoidance (data: Thursday = 138 avg views, 2.7x worse than Friday)
  avoid_days: ["thursday"]
  # Priority days (data: Fri=367, Sun=343, Wed=334 avg views)
  priority_days: ["friday", "sunday", "wednesday"]

# ─── Quality Intelligence ─────────────────────────────────────────────────────
# Smart analysis thresholds for the Frame Analysis Engine.
quality:
  # Black screen detection — pixel brightness below this = black (0-255)
  black_threshold: 20
  # Lighting correction thresholds
  backlit_brightness_threshold: 80      # Below this → apply gamma/exposure boost
  overexposed_brightness_threshold: 210 # Above this → reduce exposure
  # Dead air / silence detection
  silence_threshold_db: -35             # dB below which audio is considered silence
  min_silence_duration: 1.0             # Minimum silence length (seconds) to detect
  # Tempo / speed adjustment
  slow_wpm_threshold: 100               # Below this WPM → clip feels slow → speed up
  # Frame analysis sampling
  frame_sample_count: 5                 # Number of frames to sample per clip
  # Solo frame preference weight (higher = more likely to use solo)
  solo_preference_weight: 1.5

# ─── Testing ───────────────────────────────────────────────────────────────────
# Pre-generation pytest guard — tests run before every pipeline execution
testing:
  enabled: false                    # Disabled on Colab; enable locally or use --run-tests
  timeout_seconds: 120              # Max time per test
  fail_fast: true                   # Stop on first failure (-x mode)

# ── SEO ────────────────────────────────────────────────────────────────────────
seo:
  # Inject random hardcoded viral hooks/CTAs into descriptions. OFF by default:
  # the product contract prefers per-clip LLM-generated hooks over generic copy.
  inject_viral_elements: false
  # Sleep between SEO calls for each clip (seconds). Longer = less rate limiting.
  inter_clip_sleep_s: 30

# ── SEO Learner ─────────────────────────────────────────────────────────────────
# Self-improving SEO system — learns from past performance to boost future clips.
learner:
  decay_half_life_days: 30           # How fast old clips lose influence (30 days = 50% weight)
  min_clips_for_pattern: 2           # Min clips before a pattern is considered stable
  llm_insights: true                 # Feed data to LLM for deep analytical insights

# ── AI SEO & Automation ────────────────────────────────────────────────────────
ai:
  provider: "opencode"          # opencode (Go) | nvidia
  model: "mimo-v2.5-pro"        # primary (qwen3.7-max returns 401 for oa-compat)
  # Provider chain priority:
  # 1. OpenCode Go: mimo-v2.5-pro
  # 2. OpenCode Go: deepseek-v4-pro
  # 3. NVIDIA: llama-3.3-nemotron-super-49b-v1
  # Per-error cooldown durations (seconds). Set 0 for defaults.
  cooldown_seconds:
    auth_failure: 7200           # 2 hours
    quota_exhausted: 7200        # 2 hours
    rate_limit: 300              # 5 minutes
    model_not_found: 300         # 5 minutes
    timeout: 120                 # 2 minutes
    server_error: 120            # 2 minutes
  # Circuit breaker: provider-level cooldown after N consecutive failures
  circuit_breaker_max_failures: 15
  circuit_breaker_cooldown_seconds: 900  # 15 minutes
  auto_benchmark: false                 # Set true to auto-discover best model on startup
  # ── LLM orchestration resilience (feat/llm-orchestration) ──────────────────
  retry_base_delay_seconds: 2.0         # Backoff before the failover retry round (transient/429/5xx only)
  retry_max_delay_seconds: 30.0         # Cap on backoff delay
  race_tier_timeout_seconds: 45.0       # Per-tier deadline for fastest-first racing (keeps slow-but-valid responses)
  # Token-bucket rate limiting is applied PER provider:model (not per provider),
  # so racing several models of one provider in a tier no longer drains a single
  # shared bucket. Tune for your providers' free-tier request limits.
  rate_limit:
    capacity: 30                        # Burst size per provider:model bucket
    refill_per_sec: 0.5                 # Sustained refill (0.5/s ≈ 30 req/min per model)
  system_prompt: |
    You are a desi YouTube SEO expert specializing in viral cricket shorts for Indian and Pakistani audiences.
    Generate high-CTR titles, engaging descriptions, and optimized tags in Hinglish/Hindi/Urdu.
    Use emojis, bakchodi, and full-on desi cricket discussion style — no boring English commentary.
    Focus on Indian and Pakistani cricket audience with drawing-room style banter.

# ── Thumbnail Automation ──────────────────────────────────────────────────────
thumbnail:
  enabled: true
  use_ai: false                     # Set to true for AI image generation (Nano Banana 2)
  template_path: "channel_logo.png"  # Use logo as a watermark/element
  font_path: ""                      # Empty → auto-detect per-OS (Windows/macOS/Linux)
  font_size: 120
  text_color: "#FFFFFF"
  stroke_color: "#000000"
  stroke_width: 8
  # Auto A/B testing: how many variants to generate
  variants_count: 3

# ── Logging ──────────────────────────────────────────────────────────────────
# ── Clip Selection (7-Agent System) ─────────────────────────────────────────
clip_selection:
  enabled: true                        # Use 7-agent clip selector (false = old heuristic)
  use_llm_arbiter: true                # Run LLM Final Arbiter pass
  min_quality: 20.0                    # Min weighted score (0-100) to keep a clip
  max_selected: 10                     # Max clips to select

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  level: "INFO"                         # DEBUG | INFO | WARNING | ERROR
  log_file: "logs/pipeline.log"

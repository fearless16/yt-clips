# yt-clips Configuration
# Adjust these values to match your stream layout and hardware

# ─── Paths ────────────────────────────────────────────────────────────────────
paths:
  input:       input/
  temp:        temp/
  transcripts: transcripts/
  highlights:  highlights/
  shorts:      shorts/            # Final output — date-stamped subfolders
  logs:        logs/
channel:
  id: "UCQtCMKPc41MHd7hujVuGm5g"        # your YouTube channel ID
  live_stream_url: "https://www.youtube.com/watch?v=qAA6KKwHLU8"              # static fallback (optional)
# ─── Download ─────────────────────────────────────────────────────────────────
download:
  # Best available quality (no cap — downloads highest resolution available)
  format: "bv*+ba/b"
  concurrent_fragments: 16
  sleep_requests: 0
  progress_interval_seconds: 10
  progress_percent_step: 5
  output_filename: "video.mp4"
  # aria2c: 2-3x faster downloads on Colab (install: apt-get install -y aria2)
  use_aria2c: true
  # Proof of Origin (PO) Token — for bypassing bot detection
  po_token: "" 
  # Optional: Proxy for bypassing Colab IP blocks (e.g. http://user:pass@host:port)
  proxy: ""
# ─── Transcription ────────────────────────────────────────────────────────────
transcription:
  model: "medium"                       # tiny | base | small | medium | large-v3
  language: "hi"                        # Hindi commentary — use hi for better accuracy
  device: "cuda"            # Prioritizes GPU, auto-falls back to CPU if missing
  compute_type: "float16"    # Optimized for GPU; auto-switches to int8 on CPU fallback
# ─── Highlight Detection ──────────────────────────────────────────────────────
highlight:
  # AI-powered highlight refinement
  use_ai_refinement: true              # Use LLM to select viral-worthy clips
  # Audio energy spike detection
  audio_energy_threshold: 0.3          # 0–1 relative to score range; lower = more clips
  # Minimum/maximum clip duration (seconds)
  min_duration: 10
  max_duration: 29                      # User requested less than 30s
  # Merge nearby highlights that are closer than this (seconds)
  merge_gap: 5
  # How many highlights to extract at most
  max_clips: 10
  # Words-per-minute threshold for "fast speech" detection
  fast_speech_wpm: 140
  # Silence threshold (seconds of silence to penalise a segment)
  silence_penalty_seconds: 1.5

# ─── Premium Mode ──────────────────────────────────────────────────────────────
# Toggle between cheap (Haar Cascade) and premium (YOLOv8-face + ByteTrack)
premium:
  enabled: false                     # Set true on Colab T4 for studio-grade quality
  face_enhancement: true             # GFPGAN face restoration (GPU only)
  frame_interpolation: true          # FILM 30→60fps (GPU only)
  host_ref_photos: ""                # Path to reference photos for host ID (optional)

# ─── Layout ──────────────────────────────────────────────────────────────────
# Describes where the facecam lives in the SOURCE 16:9 frame (pixels).
# Set has_facecam: false if the stream has no facecam overlay.
# NOTE: Facecam coords are VALIDATED at runtime against actual source dimensions.
#       If coords exceed the source frame, facecam mode is auto-disabled.
layout:
  has_facecam: true
  # Facecam region in source video (x, y, width, height) — update per stream
  facecam:
    x: 0
    y: 540
    width: 320
    height: 180
  # How tall the facecam strip is in the 9:16 output (pixels, out of 1920)
  facecam_output_height: 400
  # Gameplay strip height = 1920 - facecam_output_height
  gameplay_output_height: 1520
  # Chat overlay detection (common in gaming/streams)
  # Chat typically appears on the RIGHT side of 16:9 streams
  has_chat_overlay: true
  chat:
    side: "right"            # right | left
    # Estimated chat width in source video (will be auto-detected if possible)
    estimated_width: 350
    # Minimum brightness threshold to detect chat area (chat is usually brighter/darker than gameplay)
    brightness_threshold: 30

# ─── Export ───────────────────────────────────────────────────────────────────
export:
  width: 1080
  height: 1920
  global_speed_factor: 1.0              # Set to 1.0 to use variable speed only (frame_analyzer.py calculates dynamic speed)
  enable_variable_speed: true            # Enable smart speed adjustment based on silence/tempo
  variable_speed_aggressive: true       # Apply more aggressive speed up on dead air
  fps: 60                               # Target FPS (motion interpolation fills gaps)
  video_bitrate: "25M"                  # Max bitrate (used with CRF as ceiling)
  audio_bitrate: "320k"                 # Studio-grade audio
  crf: 18                               # CRF quality (lower = higher quality, 15-23 recommended)
  super_resolution: true                 # AI 4x upscale via Real-ESRGAN (GPU only; auto-skips on CPU)
  ffmpeg_timeout_seconds: 900           # Prevent hung FFmpeg exports
  min_output_bytes: 100000              # Reject tiny/corrupt exports
  # Hardware encoder — h264_videotoolbox is best for Mac
  encoder: "h264_videotoolbox"          # h264_videotoolbox | h264_nvenc | libx264
  encoder_preset: "medium"              # Only used by libx264; videotoolbox ignores this
  # Crop smoothing factor (0–1); lower = smoother but more lag
  crop_smooth_factor: 0.2
  # ─── Cloud Enhancement (Replicate API) ──────────────────────────────────────
  # Alternative to local GPU — works on any machine, ~$0.18/clip
  # Set REPLICATE_API_TOKEN env var or add to .env
  cloud_enhancement:
    enabled: false                      # Enable Replicate API for enhancement
    reframe: true                       # AI face-aware 16:9 → 9:16 reframe
    upscale: true                       # Cloud upscaling (2x)
    reframe_model: "luma/reframe-video"
    upscale_model: "lucataco/real-esrgan-video"
    upscale_scale: 2                    # 2x or 4x
    # Falls back to local GPU (super_res.py) if cloud fails
    fallback_to_local: true
  # ─── Cinematic Transitions ─────────────────────────────────────────────────
  transitions:
    fade_in_duration: 0.5               # seconds — smooth fade from black on open
    fade_out_duration: 0.5              # seconds — smooth fade to black on close
    audio_fade_in: 0.3                  # seconds — audio crossfade in
    audio_fade_out: 0.4                 # seconds — audio crossfade out

# ─── YouTube Upload ──────────────────────────────────────────────────────────
youtube:
  privacy_status: "private"              # private | unlisted | public
  category_id: "17"                     # 17 = Sports
  self_declared_made_for_kids: false
  enforce_shorts_eligibility: true      # Refuse landscape/too-long files before upload
  shorts_max_seconds: 180               # Current YouTube Shorts maximum duration
  upload_enabled: true                  # 🚀 GO LIVE!
  schedule_interval_hours: 2            # Automate posting every 2 hours (Algorithmic Sweet Spot)
  niche: "Cricket"                      # Used for SEO trend analysis

# ─── Quality Intelligence ─────────────────────────────────────────────────────
# Smart analysis thresholds for the Frame Analysis Engine.
quality:
  # Black screen detection — pixel brightness below this = black (0-255)
  black_threshold: 20
  # Lighting correction thresholds
  backlit_brightness_threshold: 80      # Below this → apply gamma/exposure boost
  overexposed_brightness_threshold: 210 # Above this → reduce exposure
  # Dead air / silence detection
  silence_threshold_db: -35             # dB below which audio is considered silence
  min_silence_duration: 1.0             # Minimum silence length (seconds) to detect
  # Tempo / speed adjustment
  slow_wpm_threshold: 100               # Below this WPM → clip feels slow → speed up
  # Frame analysis sampling
  frame_sample_count: 5                 # Number of frames to sample per clip
  # Solo frame preference weight (higher = more likely to use solo)
  solo_preference_weight: 1.5

# ─── Testing ───────────────────────────────────────────────────────────────────
# Pre-generation pytest guard — tests run before every pipeline execution
testing:
  enabled: false                    # Disabled on Colab; enable locally or use --run-tests
  timeout_seconds: 120              # Max time per test
  fail_fast: true                   # Stop on first failure (-x mode)

# ── AI SEO & Automation ────────────────────────────────────────────────────────
ai:
  provider: "openrouter"            # groq | deepseek | openrouter | nvidia | xai | ollama
  model: "deepseek/deepseek-v4-flash"     # 284B MoE via OpenRouter — best quality/price
  # Benchmark results (16 May 2026, verified live):
  # Provider  Model                                        Score  Latency  Cost
  # ──────────────────────────────────────────────────────────────────────────────
  # OpenRouter deepseek/deepseek-v4-flash (284B MoE)       60     3.7s     ~$0.14/M  ← SELECTED
  # OpenRouter google/gemini-2.0-flash-001                 60     2.4s     ~$0.10/M
  # Groq      llama-4-scout-17b-16e-instruct               58     0.5s     $0.11/M
  # Groq      llama-3.1-8b-instant                         55     0.7s     $0.05/M
  # DeepSeek  deepseek-v4-flash (direct, own key)          60     1.8s     $0.14/M  ← needs balance
  # Groq      llama-3.3-70b-versatile                      50     1.0s     $0.59/M
  # OpenRouter anthropic/claude-3.5-haiku                  50     4.3s     $0.80/M
  # NVIDIA    meta/llama-3.3-70b-instruct                  45     7.4s     ~$0.50/M
  # DeepSeek  deepseek-v4-pro (1.6T params)                65     3.1s     $1.74/M
  #
  # Free tier: OpenRouter deepseek/deepseek-v4-flash:free (queue-throttled, ~30s+)
  # Speed path: set provider=groq model=llama-4-scout-17b-16e-instruct (0.5s)
  # Auto-benchmark: seo_learner.py can dynamically test and select best model
  auto_benchmark: false                 # Set true to auto-discover best model on startup
  system_prompt: |
    You are a YouTube SEO expert specializing in Cricket Shorts.
    Generate high-CTR titles, engaging descriptions, and optimized tags.
    Focus on Indian cricket audience. Use English only — no Hinglish or Hindi.

# ── Thumbnail Automation ──────────────────────────────────────────────────────
thumbnail:
  enabled: true
  use_ai: false                     # Set to true for AI image generation (Nano Banana 2)
  template_path: "channel_logo.png"  # Use logo as a watermark/element
  font_path: "/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf" # Colab friendly
  font_size: 120
  text_color: "#FFFFFF"
  stroke_color: "#000000"
  stroke_width: 8
  # Auto A/B testing: how many variants to generate
  variants_count: 3

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  level: "INFO"                         # DEBUG | INFO | WARNING | ERROR
  log_file: "logs/pipeline.log"
